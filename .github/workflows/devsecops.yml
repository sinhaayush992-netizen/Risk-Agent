name: DevSecOps Agent Pipeline
 
on:
  push:
    branches:
      - main
 
jobs:
  build-and-security-scan:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Checkout DevSecOps Project
        uses:  actions/checkout@v4 
        with:
          repository: sinhaayush992-netizen/DevSecOps-Agent
          path: DevSecOps-Agent
      - name: Verify Repo
        run: ls -R

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
 
      - name: Build Project
        run: mvn -f DevSecOps-Agent/pom.xml clean install
 
      # SonarCloud Scan
      - name: SonarCloud Scan
        run: |
          mvn -f DevSecOps-Agent/pom.xml sonar:sonar  \
          -Dsonar.projectKey=sinhaayush992-netizen_DevSecOps-Agent \
          -Dsonar.organization=sinhaayush992-netizen \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Make Maven wrapper executable
        run: chmod +x DevSecOps-Agent/mvnw
 
      # Snyk Scan
      - name: Install snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      - name: Snyk Security Scan
        run: snyk test --file=DevSecOps-Agent/pom.xml
        continue-on-error: true
      #  env:
       #   SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}